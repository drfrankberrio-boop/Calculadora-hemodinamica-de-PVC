<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Presión Venosa Central</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        color: #0f172a;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 900px;
        margin: auto;
    }
    .card {
        background: #f1f5f9;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
        color: #0284c7;
    }
    input, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5f5;
    }
    button {
        background-color: #0284c7;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }
    .result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }
    .footer {
        text-align: center;
        margin-top: 30px;
        font-size: 14px;
        color: #475569;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Calculadora de Presión Venosa Central</h1>

    <div class="card">
        <h2>PVC por CVC (cmH₂O)</h2>

        <label>Altura en cmH₂O (desde punto flebostático):</label>
        <input type="number" id="cmh2o" placeholder="Ej: 10">

        <button onclick="calcularPVC()">Calcular</button>

        <div class="result" id="resultadoPVC"></div>
    </div>

    <div class="card">
        <h2>PVC estimada por VCI (Ecografía)</h2>

        <label>Diámetro máximo VCI (cm):</label>
        <input type="number" step="0.1" id="diametroMax" placeholder="Ej: 2.1">

        <label>Diámetro mínimo VCI (cm):</label>
        <input type="number" step="0.1" id="diametroMin" placeholder="Ej: 1.0">

        <button onclick="calcularVCI()">Calcular</button>

        <div class="result" id="resultadoVCI"></div>
    </div>

</div>

<div class="footer">
    Creado por el Doctor Francisco Berrio - Residente de cuarto año de Terapia Intensiva - Clínica ITEBA y USAL | Utilizando IA
</div>

<script>

function calcularPVC() {
    let cm = parseFloat(document.getElementById("cmh2o").value);

    if (isNaN(cm)) {
        document.getElementById("resultadoPVC").innerHTML = "⚠️ Ingresa un valor válido";
        return;
    }

    let mmHg = cm / 1.36;
    let clasificacion = "";

    if (mmHg < 5) {
        clasificacion = "PVC baja (hipovolemia)";
    } else if (mmHg <= 10) {
        clasificacion = "PVC normal";
    } else {
        clasificacion = "PVC alta (sobrecarga o disfunción derecha)";
    }

    document.getElementById("resultadoPVC").innerHTML =
        `PVC: ${mmHg.toFixed(2)} mmHg → ${clasificacion}`;
}

function calcularVCI() {
    let max = parseFloat(document.getElementById("diametroMax").value);
    let min = parseFloat(document.getElementById("diametroMin").value);

    if (isNaN(max) || isNaN(min) || max <= 0 || min < 0 || min > max) {
        document.getElementById("resultadoVCI").innerHTML = "⚠️ Valores inválidos";
        return;
    }

    let colapso = ((max - min) / max) * 100;
    let resultado = "";

    if (max < 2.1 && colapso > 50) {
        resultado = `Colapsabilidad: ${colapso.toFixed(1)}% → PVC 0–5 mmHg (baja)`;
    } 
    else if (max > 2.1 && colapso < 50) {
        resultado = `Colapsabilidad: ${colapso.toFixed(1)}% → PVC 10–20 mmHg (alta)`;
    } 
    else {
        resultado = `Colapsabilidad: ${colapso.toFixed(1)}% → PVC 5–10 mmHg (intermedia)`;
    }

    document.getElementById("resultadoVCI").innerHTML = resultado;
}

</script>

</body>
</html>
